<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div id="container">
    <!--leftside-->
    <div id="leftside">
        <video autoplay muted loop playsinline class="leftbg">
            <source src="assets/videos/campvid.mp4" type="video/mp4">
        </video>
    </div>
    <!-------------------->
    <!--rightside-->
    <div id="rightside">
        <div id="signin">
        <h2>Sign In</h2>
        <form action="" method="post">
            <input type="email" id="email" name="email"  placeholder="Email" required><br><br>
            <input type="password" id="password" name="password" placeholder="Password" required><br><br>
            <input type="submit" value="Sign In">
            <div class="divider">
            </div>
            <div>

            </div>

            <div>
                <p>Don't have an account? <a href="#signup">Register here</a>.</p>
            </div>
        </form>
    </div>
    <!-------------------->
    <!--sign up-->
    <div id="signup">
        <h2>Sign Up</h2>
        <form action="" method="post">
            <input type="text" id="firstname" name="firstname" placeholder="First Name"><br><br>
            <input type="text" id="lastname" name="lastname" placeholder="Last Name"><br><br>
            <input type="email" id="email" name="email" placeholder="Email" required><br><br>
            <input type="password" id="password" name="password" placeholder="Password" required><br><br>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required><br><br>
            <input type="submit" value="Sign Up">
            <div>
                <p>Have an account? <a href="#signup">Log In</a></p>
            </div>

        </form>
    </div>
    <!-------------------->
</div>
</body>
</html>
