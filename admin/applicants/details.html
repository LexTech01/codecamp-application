<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicant Details</title>
    <link rel="stylesheet" href="../../css/admin-dashboard.css">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <h2><i class="fas fa-shield-alt"></i> Admin Panel</h2>
            <ul>
                <li><a href="../admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="list.html"><i class="fas fa-users"></i> Applicants</a></li>
                <li><a href="../interview.html"><i class="fas fa-video"></i> Interviews</a></li>
            </ul>
            <div class="logout">
                <a href="../../admin-login.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>
        <main class="main-content">
            <div class="topbar">
                <h1>Applicant Details</h1>
            </div>
            <section class="applicants-section">
                <div style="display: flex; gap: 30px;">
                    <div style="flex: 1;">
                        <h2>John Doe (ID: 1)</h2>
                        <p><strong>Email:</strong> john@example.com</p>
                        <p><strong>Phone:</strong> +1-234-567</p>
                        <p><strong>Applied for:</strong> Software Engineering</p>
                        <p><strong>Date Applied:</strong> 2024-07-01</p>
                    </div>
                    <div style="flex: 1;">
                        <h3>Progress</h3>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 200px; height: 10px; background: #ddd; border-radius: 5px;">
                                <div style="width: 75%; height: 100%; background: #004AAD; border-radius: 5px;"></div>
                            </div>
                            <span>75%</span>
                        </div>
                    </div>
                </div>
                <h3 style="margin-top: 30px;">Challenge Scores</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Challenge</th>
                            <th>Score</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Puzzles</td>
                            <td>85%</td>
                            <td>45min</td>
                        </tr>
                        <tr>
                            <td>Squares</td>
                            <td>80%</td>
                            <td>52min</td>
                        </tr>
                    </tbody>
                </table>
                <div style="margin-top: 30px;">
                    <button class="btn-primary">Accept</button>
                    <button style="background: #28a745;">Reject</button>
                    <button class="btn-edit">Schedule Interview</button>
                    <a href="list.html" style="text-decoration: none;">
                        <button>Back to List</button>
                    </a>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
