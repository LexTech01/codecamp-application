<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decisions - Admin</title>
    <link rel="stylesheet" href="../css/admin-dashboard.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <h2><i class="fas fa-shield-alt"></i> Admin Panel</h2>
            <ul>
                <li><a href="admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="applicants/list.html"><i class="fas fa-users"></i> Applicants</a></li>
                <li><a href="decisions.html"><i class="fas fa-check-circle"></i> Decisions</a></li>
            </ul>
            <div class="logout">
                <a href="admin-login.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>
        <main class="main-content">
            <div class="topbar">
                <h1>Application Decisions</h1>
            </div>
            <section class="applicants-section">
                <h2 class="section-title">
                    <i class="fas fa-gavel"></i> Pending Decisions
                </h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Score</th>
                                <th>Interview</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Jane Smith</td>
                                <td>92%</td>
                                <td>Passed</td>
                                <td>
                                    <button class="btn-primary">Accept</button>
                                    <button style="background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 5px;">Reject</button>
                                </td>
                            </tr>
                            <!-- More mock rows -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
